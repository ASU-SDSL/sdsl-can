# Minimal config for LED blink + logs
CONFIG_GPIO=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_MAIN_STACK_SIZE=2048

CONFIG_CAN=y
CONFIG_CAN_INIT_PRIORITY=80
CONFIG_ISOTP=y
CONFIG_ISOTP_RX_SF_FF_BUF_COUNT=2

CONFIG_NANOPB=y

# These must match your can_link logic
CONFIG_CAN_LINK_NODE_ADDR=1
CONFIG_CAN_LINK_PEER_NODE_ADDR=2
CONFIG_CAN_LINK_LOOPBACK=y  # Set to 'y' for single-board testing